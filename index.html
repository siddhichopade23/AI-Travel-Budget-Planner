<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Budget Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌍 AI Travel Budget Planner</h1>
        <p>Plan your perfect trip with AI.</p>

        <form id="travelForm">

            <label for="destination">Destination</label>
            <input type="text" id="destination" placeholder="Enter destination" required>

            <label for="days">Number of Days</label>
            <input type="number" id="days" placeholder="Enter number of days" required>

            <label for="budget">Budget (₹)</label>
            <input type="number" id="budget" placeholder="Enter your budget" required>

            <label for="style">Travel Style</label>
            <select id="style">
                <option value="Budget">Budget</option>
                <option value="Standard">Standard</option>
                <option value="Luxury">Luxury</option>
            </select>

            <button type="button" onclick="generatePlan()">
                Generate AI Travel Plan
            </button>

        </form>

        <div id="result">
            <div id="destinationImage"></div>
            <h2>Your AI Travel Plan</h2>

            <div id="itinerary"></div>

            <div id="expenses"></div>
            <div id="budgetBar"></div>

            <div id="packing"></div>
            <div id="mapButton"></div>
            <div id="weather"></div>
            <div id="hotels"></div>
            <div id="food"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
